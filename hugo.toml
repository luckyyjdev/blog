baseURL = "/"
locale = "zh-cn"
title = "我的博客"
theme = "PaperMod"

[params]
  author = "Luckyyj"
  description = "个人技术博客"
  defaultTheme = "auto"
  ShowShareButtons = false
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  comments = false

  [params.homeInfoParams]
    Title = "欢迎来到我的博客"
    Content = "记录技术、分享生活\n\n🚧 博客施工中，更多内容敬请期待！"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/luckyyjdev"

  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/cookie_yyj"

  [[params.socialIcons]]
    name = "vrchat"
    url = "https://vrchat.com/home/user/usr_1e9b84c3-4368-4da8-a8ae-3c5991a3dd13"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.editPost]
    URL = ""
    Text = "编辑本文"
    appendFilePath = true

  [params.assets]
    favicon = "/favicon.ico"

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 10

[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 20

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 30

[params.search]
  enable = true
