baseURL = "https://www.luckyyj.eu.org/"
locale = "zh-cn"
title = "鳄鱼的小站"
theme = "PaperMod"
enableRobotsTXT = true

[params]
  author = "Luckyyj"
  description = "个人技术博客"
  keywords = ["技术博客", "程序员", "VRChat", "Hugo", "前端开发"]
  defaultTheme = "auto"
  ShowShareButtons = false
  ShowReadingTime = true
  ShowWordCount = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  comments = false

  [params.homeInfoParams]
    Title = "欢迎来到鳄鱼的小站"
    Content = "记录技术、分享生活\n\n🚧 博客施工中，敬请期待！"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/luckyyjdev"

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/cookie_yyj"

  [[params.socialIcons]]
    name = "vrchat"
    url = "https://vrchat.com/home/user/usr_1e9b84c3-4368-4da8-a8ae-3c5991a3dd13"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.editPost]
    URL = ""
    Text = "编辑本文"
    appendFilePath = true

  [params.assets]
    favicon = "/favicon.ico"

  env = "production"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[[menu.main]]
  identifier = "home"
  name = "首页"
  url = "/"
  weight = 5

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 10

[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 20

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 15

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 30

[params.search]
  enable = true
